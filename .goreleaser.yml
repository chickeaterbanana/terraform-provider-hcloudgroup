# Based on the hashicorp terraform-provider-scaffolding-framework template.
# https://github.com/hashicorp/terraform-provider-scaffolding-framework/blob/main/.goreleaser.yml
#
# This is what the Terraform Registry expects:
#   - One zip per (os, arch) pair, plus a SHA256SUMS file, plus a GPG
#     signature over SHA256SUMS.
#   - Manifest declaring protocol_versions = ["6.0"].
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - '-s -w -X main.version={{.Version}} -X main.commit={{.Commit}}'
    # Linux/macOS/FreeBSD only — exec.go uses syscall.Setpgid + syscall.Kill
    # for child-process management on action timeout, both Unix-specific.
    # Windows support is a v2 concern (README §2.1).
    goos:
      - linux
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: arm
    binary: '{{ .ProjectName }}_v{{ .Version }}'

archives:
  - formats: [zip]
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

checksum:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'
  name_template: '{{ .ProjectName }}_{{ .Version }}_SHA256SUMS'
  algorithm: sha256

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

sboms:
  - artifacts: archive

release:
  extra_files:
    - glob: 'terraform-registry-manifest.json'
      name_template: '{{ .ProjectName }}_{{ .Version }}_manifest.json'

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([^)]+\))?!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\([^)]+\))?!?:.+$'
      order: 1
    - title: Dependencies
      regexp: '^.*?deps(\([^)]+\))?!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'
