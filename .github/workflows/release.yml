# Triggered when a new tag matching v* is pushed (e.g. v0.1.0). Builds
# all platform binaries via goreleaser, signs the SHA256SUMS file with
# the project GPG key, and publishes them as a GitHub release. The
# Terraform registry watches GitHub releases for this repo and ingests
# the artifacts.
#
# Required repo secrets:
#   GPG_PRIVATE_KEY  — armored, exported with --export-secret-keys --armor
#   PASSPHRASE       — passphrase for the above
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
