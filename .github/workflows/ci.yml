name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  schedule:
    # Nightly acctest — 03:17 UTC, off the hour to avoid scheduler bunching.
    - cron: "17 3 * * *"

jobs:
  test:
    name: Hermetic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: go build ./...
      - run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  acctest:
    name: Acceptance (real hcloud)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    concurrency:
      # Single shared Hetzner sandbox — never run two acctest jobs at once.
      group: acctest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y openssh-client
      - run: make testacc
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
