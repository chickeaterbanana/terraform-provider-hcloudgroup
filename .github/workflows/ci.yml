name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    name: Hermetic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - run: go build ./...
      - run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      # v8 is the first action release that understands the
      # golangci-lint v2 config schema (".golangci.yml: version: \"2\"").
      # Earlier action versions silently fail to parse the config and
      # exit non-zero.
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  acctest:
    name: Acceptance (real hcloud)
    runs-on: ubuntu-latest
    # Don't burn money on real-Hetzner runs when the Go build is broken.
    needs: [test, lint]
    # Runs on main pushes and on every v* tag (the tag run gates the
    # release job below). PR runs are excluded so the cycle stays fast
    # and the cost stays predictable; cut a manual run via
    # workflow_dispatch when a PR genuinely needs it.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    concurrency:
      # Single shared Hetzner sandbox — never run two acctest jobs at once.
      group: acctest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y openssh-client
      - run: make testacc
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}

  release:
    name: Release
    runs-on: ubuntu-latest
    # Tag-only. The needs chain enforces "no release without acceptance
    # beforehand" — if any of test/lint/acctest fails or is skipped, the
    # release does not run.
    needs: [test, lint, acctest]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
