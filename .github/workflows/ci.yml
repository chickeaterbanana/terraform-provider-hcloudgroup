name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: Hermetic tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"
          cache: true
      - run: go build ./...
      - run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"
          cache: true
      # v8 is the first action release that understands the
      # golangci-lint v2 config schema (".golangci.yml: version: \"2\"").
      # Earlier action versions silently fail to parse the config and
      # exit non-zero.
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.4.0

  acctest:
    name: Acceptance (real hcloud)
    runs-on: ubuntu-latest
    # Don't burn money on real-Hetzner runs when the Go build is broken.
    needs: [test, lint]
    # Runs on main pushes and on every v* tag (the tag run gates the
    # release job below). PR runs are excluded so the cycle stays fast
    # and the cost stays predictable; cut a manual run via
    # workflow_dispatch when a PR genuinely needs it.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    concurrency:
      # Single shared Hetzner sandbox — never run two acctest jobs at once.
      group: acctest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"
          cache: true
      - run: sudo apt-get update && sudo apt-get install -y openssh-client
      - name: Install OpenTofu
        env:
          TOFU_VERSION: "1.11.6"
        run: |
          BASE="https://github.com/opentofu/opentofu/releases/download/v${TOFU_VERSION}"
          ARCHIVE="tofu_${TOFU_VERSION}_linux_amd64.tar.gz"
          curl -sSfL "${BASE}/${ARCHIVE}" -o "${ARCHIVE}"
          curl -sSfL "${BASE}/tofu_${TOFU_VERSION}_SHA256SUMS" -o checksums.txt
          grep " ${ARCHIVE}\$" checksums.txt | sha256sum -c -
          tar -xzf "${ARCHIVE}" -C /usr/local/bin tofu
          rm "${ARCHIVE}" checksums.txt
      - run: make testacc
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          TF_ACC_TERRAFORM_PATH: /usr/local/bin/tofu

  release:
    name: Release
    runs-on: ubuntu-latest
    # Tag-only. The needs chain enforces "no release without acceptance
    # beforehand" — if any of test/lint/acctest fails or is skipped, the
    # release does not run.
    needs: [test, lint, acctest]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.25.x"
          cache: true
      - name: Install syft (for goreleaser SBOM generation)
        env:
          SYFT_VERSION: "1.44.0"
        run: |
          BASE="https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}"
          ARCHIVE="syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          curl -sSfL "${BASE}/${ARCHIVE}" -o "${ARCHIVE}"
          curl -sSfL "${BASE}/syft_${SYFT_VERSION}_checksums.txt" -o checksums.txt
          grep " ${ARCHIVE}\$" checksums.txt | sha256sum -c -
          tar -xzf "${ARCHIVE}" -C /usr/local/bin syft
          rm "${ARCHIVE}" checksums.txt
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
