name: Dependabot auto-merge

on: pull_request

permissions:
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (merge-commit strategy)
        # Queues a merge-commit merge once all required checks pass.
        # required_signatures is satisfied by the merge commit, which
        # GitHub signs via its web-flow key — re-signing the Dependabot
        # branch tip is not required.
        run: gh pr merge --merge --auto "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
