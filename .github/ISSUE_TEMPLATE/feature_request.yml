name: Feature Request
description: Propose a new resource, data source, or behavior change.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish that the provider cannot do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed schema or behavior
      description: Sketch the resource/data-source schema or the behavior change you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated.

  - type: textarea
    id: workaround
    attributes:
      label: Current workaround
      description: How you work around the limitation today, if at all.
